services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    environment:
      - ALLOWED_ORIGINS=*
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
